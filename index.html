<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS TKR-A v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6236FF; --success: #00D68F; --bg: #060918; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; }
        .item-minggu { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-lunas { color: var(--success); font-weight: bold; }
        .status-belum { color: #8F9BB3; }
        .hidden { display: none; }
        .admin-box { background: #fff; color: #000; padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 12px; }
        .status-btn { cursor: pointer; font-size: 18px; margin-right: 5px; }
    </style>
</head>
<body>

    <h2>KAS TKR-A 🚀</h2>

    <div id="viewLogin" class="card">
        <p>Cek Tabungan Kas Siswa</p>
        <input type="text" id="inNama" placeholder="Ketik namamu (Contoh: Tobias)">
        <button onclick="cekNama()">LIHAT PROGRESS ✨</button>
        <p style="font-size: 10px; opacity: 0.5; margin-top: 15px;" onclick="gView('viewAdminLogin')">Akses Admin</p>
    </div>

    <div id="viewSiswa" class="card hidden">
        <h3 id="txtUser" style="color: var(--success);">Nama Siswa</h3>
        <div id="listMingguan"></div>
        <button onclick="location.reload()" style="background: #444; margin-top: 20px;">KEMBALI</button>
    </div>

    <div id="viewAdminLogin" class="card hidden">
        <h3>Login Bendahara</h3>
        <input type="password" id="pAdm" placeholder="Password">
        <button onclick="authAdmin()">LOGIN</button>
    </div>

    <div id="viewAdmin" class="card hidden">
        <h3>Panel Bendahara</h3>
        <div id="listAdmSiswa"></div>
        <button onclick="location.reload()" style="background: #444; margin-top: 20px;">LOGOUT</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBooT2K0GUwktMUGsu06VIvRa-UxJ7xL58",
        authDomain: "kas-tkr-a.firebaseapp.com",
        databaseURL: "https://kas-tkr-a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-tkr-a",
        storageBucket: "kas-tkr-a.firebasestorage.app",
        messagingSenderId: "688718414863",
        appId: "1:688718414863:web:7942d2d911455a79388f7a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    // Kita arahkan ke root '/' karena data JSON kamu sepertinya ada di root
    const dbRef = ref(db); 

    const daftarSiswa = [
        "Akhlis Tsani", "Angga Maesya Putra", "Anwarul Fahmi Ramadhani", "Arya Galih Pratama",
        "Ega Ginaryo Al Amin", "Galih Prasetyo", "M. Maulin Supriyanto", "M. Agung Saputra",
        "M. Awalu Rohmatul Gufron", "M. Daffa Nabih", "M. Dwi Rosidin", "M. Fahri Dwi Hermawan",
        "M. Fajar Saputra", "M. Ferdi Hardiyansyah", "M. Ilyas Ahmadi", "M. Imam Solihin",
        "M. Kelvin Ramadhon", "M. Mustofa", "M. Mutamar", "M. Rokhibun Naza", 
        "M. Zainal Mutaqin", "M. Zikna Afifana", "Maulana Ramadhani", "Mohamad Ardiyansyah",
        "Muhamad Khoirul Anam", "Restu Ando Saputra", "Surya Saputra",
        "Tirta Bayu Saputra", "Tobias Arka Diva", "Wafiq Zam Zami"
    ];

    let dataKas = {}; let curSiswa = "";

    // FUNGSI KRUSIAL: Menyamakan format dengan JSON (Spasi/Titik jadi _)
    const cleanKey = (name) => name.replace(/[\s.]/g, "_");

    // Ambil Data Realtime
    onValue(dbRef, (s) => {
        dataKas = s.val() || {};
        console.log("Database terkoneksi!");
    });

    window.cekNama = () => {
        const input = document.getElementById('inNama').value.trim().toLowerCase();
        const match = daftarSiswa.find(n => n.toLowerCase().includes(input));
        if (match && input.length > 2) {
            curSiswa = match;
            showSiswa();
        } else { alert("Nama tidak ditemukan / kurang lengkap!"); }
    };

    window.showSiswa = () => {
        document.getElementById('viewLogin').classList.add('hidden');
        document.getElementById('viewSiswa').classList.remove('hidden');
        document.getElementById('txtUser').innerText = curSiswa;
        let html = "";
        for(let i=1; i<=10; i++) {
            let k = cleanKey(curSiswa) + "_m" + i;
            let status = dataKas[k] || "belum";
            html += `<div class="item-minggu">
                <span>Minggu ${i}</span>
                <span class="${status === 'lunas' ? 'status-lunas' : 'status-belum'}">${status.toUpperCase()}</span>
            </div>`;
        }
        document.getElementById('listMingguan').innerHTML = html;
    };

    window.gView = (id) => {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.authAdmin = () => {
        if(document.getElementById('pAdm').value === 'bendahara123') {
            gView('viewAdmin');
            renderAdmin();
        } else { alert("Salah!"); }
    };

    window.renderAdmin = () => {
        let html = daftarSiswa.map(n => {
            let btns = "";
            for(let i=1; i<=5; i++) {
                let k = cleanKey(n) + "_m" + i;
                let s = dataKas[k] || "belum";
                let icon = s === 'lunas' ? '✅' : '⬜';
                btns += `<span class="status-btn" onclick="upStat('${n}', ${i}, '${s}')">${icon}</span>`;
            }
            return `<div class="admin-box"><b>${n}</b><br>${btns}</div>`;
        }).join('');
        document.getElementById('listAdmSiswa').innerHTML = html;
    };

    window.upStat = (nama, m, cur) => {
        let next = cur === 'lunas' ? 'belum' : 'lunas';
        let k = cleanKey(nama) + "_m" + m;
        update(dbRef, { [k]: next });
        setTimeout(renderAdmin, 500); // Refresh tampilan admin
    };
</script>
</body>
</html>
